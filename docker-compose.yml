services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bnr_compliance
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bnr_compliance"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./moduleRepos/backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_ADMIN_URL: postgres://postgres:postgres@db:5432/bnr_compliance
      DATABASE_URL: postgres://bnr_app:bnr_app_password@db:5432/bnr_compliance
      JWT_SECRET: change_this_secret_in_production_min_32_chars
      JWT_EXPIRES_IN: 30m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./moduleRepos/frontend
    depends_on:
      - backend
    environment:
      BACKEND_TARGET: http://backend:3000
    ports:
      - "4000:4000"

volumes:
  pgdata:
  uploads:
